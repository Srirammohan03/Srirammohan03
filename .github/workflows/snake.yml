name: Generate Contribution Snake

on:
  schedule:
    # Runs at 12:00 AM every day
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate Cyberpunk Snake
        uses: Platane/snk@v3
        with:
          github_user_name: Srirammohan03
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#00F5FF&color_dots=#020617,#0F172A,#1E293B,#7F5AF0,#00F5FF
            dist/ocean.gif?color_snake=#00F5FF&color_dots=#020617,#0F172A,#1E293B,#7F5AF0,#00F5FF

      - name: Push to Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
