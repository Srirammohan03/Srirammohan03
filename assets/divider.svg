<svg width="100%" height="20" viewBox="0 0 1200 20" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="div-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#020617" stop-opacity="0" />
      <stop offset="30%" stop-color="#7F5AF0" stop-opacity="1" />
      <stop offset="50%" stop-color="#00F5FF" stop-opacity="1" />
      <stop offset="70%" stop-color="#7F5AF0" stop-opacity="1" />
      <stop offset="100%" stop-color="#020617" stop-opacity="0" />
    </linearGradient>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect x="0" y="9" width="1200" height="2" fill="url(#div-grad)" filter="url(#neon-glow)" />
  <circle cx="600" cy="10" r="4" fill="#00F5FF" filter="url(#neon-glow)"/>
</svg>
