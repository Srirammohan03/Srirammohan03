<svg width="1200" height="200" viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grid-fade" x1="0" y1="100%" x2="0" y2="0%">
      <stop offset="0%" stop-color="#00F5FF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <g stroke="url(#grid-fade)" stroke-width="2">
    <!-- Perspective lines -->
    <line x1="600" y1="0" x2="600" y2="200" />
    <line x1="600" y1="0" x2="300" y2="200" />
    <line x1="600" y1="0" x2="900" y2="200" />
    <line x1="600" y1="0" x2="0" y2="200" />
    <line x1="600" y1="0" x2="1200" y2="200" />
    <line x1="600" y1="0" x2="-300" y2="200" />
    <line x1="600" y1="0" x2="1500" y2="200" />
    <!-- Horizontal lines mapping perspective -->
    <line x1="0" y1="180" x2="1200" y2="180" />
    <line x1="0" y1="140" x2="1200" y2="140" />
    <line x1="0" y1="100" x2="1200" y2="100" />
    <line x1="0" y1="60" x2="1200" y2="60" />
    <line x1="0" y1="30" x2="1200" y2="30" />
  </g>
</svg>
