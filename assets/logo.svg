<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur1" />
      <feGaussianBlur stdDeviation="5" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" rx="20" fill="#0F172A" stroke="#1E293B" stroke-width="2"/>
  <text x="50" y="65" font-family="'Orbitron', sans-serif, 'Space Grotesk'" font-size="42" font-weight="bold" fill="#00F5FF" text-anchor="middle" filter="url(#neon)">PS</text>
</svg>
